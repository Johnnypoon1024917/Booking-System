server {
    # Port 8080: the runtime uses the non-root nginx-unprivileged image
    # (AUD-029), which cannot bind the privileged port 80.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers on the SPA document/assets (AUD-021). The Nest API sets
    # its own via helmet, but the first browser-loaded document is served here by
    # nginx, so it needs equivalent protection. `always` so they're emitted on
    # error responses too. HSTS is only meaningful once TLS terminates at/above
    # this layer; enable it where HTTPS is terminated.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    # Uncomment when serving over HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compress text assets on the wire.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → NestJS backend on the internal compose network.
    # proxy_buffering off + HTTP/1.1 keepalive + long read timeout keep the
    # realtime Server-Sent Events feed (/api/v1/realtime/...) streaming; with
    # buffering on, nginx would hold the stream and live updates would stall.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host api:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SCIM provisioning endpoint (RFC 7644 path, outside the /api prefix).
    location /scim/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host api:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Liveness probe (bypasses the api/v1 prefix in main.ts).
    location = /health {
        proxy_pass http://api:3000;
        proxy_set_header Host api:3000;
    }

    # SPA client-side routing: any non-asset, non-API path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
