server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the wire.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → NestJS backend on the internal compose network.
    # proxy_buffering off + HTTP/1.1 keepalive + long read timeout keep the
    # realtime Server-Sent Events feed (/api/v1/realtime/...) streaming; with
    # buffering on, nginx would hold the stream and live updates would stall.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SCIM provisioning endpoint (RFC 7644 path, outside the /api prefix).
    location /scim/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Liveness probe (bypasses the api/v1 prefix in main.ts).
    location = /health {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    # SPA client-side routing: any non-asset, non-API path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
