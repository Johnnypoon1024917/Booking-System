# Multi-instance overlay for docker-compose.prod.yml — runs N stateless `api`
# replicas behind a software nginx load balancer (the reference role of the
# "Load Balancer (FSD)" in the production diagram).
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.scale.yml \
#     up -d --build --scale api=3
#
# Because the api is stateless (JWT + Redis-backed shared state), no sticky
# sessions are required. Run the schema migration ONCE before scaling up (so N
# replicas don't race migrationsRun) — e.g. bring up a single api first, or run
# the migration as a one-shot:
#   docker compose -f docker-compose.prod.yml run --rm api npm run migration:run
services:
  # With --scale api=N the published host port must be dropped (N containers
  # can't share one host port); the LB fronts them instead.
  api:
    ports: []
    environment:
      # All replicas MUST share one Redis for cross-node realtime/rate-limit.
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      # Each replica's pool × replica-count must fit Postgres max_connections.
      # e.g. 3 api × DB_POOL_MAX=20 = 60 < PG_MAX_CONNECTIONS=200.
      DB_POOL_MAX: ${DB_POOL_MAX:-20}

  lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${API_LB_PORT:-3000}:8080"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.5"

  # Point the SPA's API proxy at the LB instead of a single api container.
  frontend:
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://lb:8080}
    depends_on:
      - lb
