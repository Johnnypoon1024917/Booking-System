# Reference software load balancer for N fsd-v2 `api` replicas.
#
# The app is stateless (JWT auth; realtime/rate-limit/dedup state lives in the
# shared Redis), so NO sticky sessions are needed — any replica serves any
# request, and a dropped SSE stream reconnects to a different replica and replays
# missed events via Last-Event-ID. In the HKFSD topology the "Load Balancer
# (FSD)" hardware plays this role; this file is a drop-in for a software LB.
#
# Key SSE requirement: proxy_buffering off + a long read timeout, or the
# never-completing event stream gets buffered/reaped.

# Docker's embedded DNS. `valid=10s` re-resolves so newly-scaled replicas join
# (and dead ones leave) the rotation without an nginx reload.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 8080;

  # Health of the LB itself.
  location = /lb-health { return 200 "ok\n"; }

  location / {
    # Variable proxy_pass forces per-request DNS resolution → Docker round-robins
    # across every `api` replica instead of pinning the first IP at startup.
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Propagate / originate a request id so logs correlate across the LB and the
    # api replicas (the api echoes/uses X-Request-Id).
    proxy_set_header X-Request-Id      $request_id;

    # --- Server-Sent Events (the /api/v1/realtime stream) ---
    proxy_set_header Connection "";
    proxy_buffering   off;
    proxy_cache       off;
    proxy_read_timeout 3600s;
  }
}
