# Production compose for the Node (fsd-v2) stack.
#
# Usage:
#   cd fsd-v2
#   cp .env.example .env          # then fill in real secrets
#   # FIRST deploy only — create the schema (no migrations ship with the app):
#   DB_SYNCHRONIZE=true docker compose -f docker-compose.prod.yml up -d --build
#   # ...wait for the api to be healthy, then lock the schema and redeploy:
#   docker compose -f docker-compose.prod.yml up -d --build   # DB_SYNCHRONIZE=false (default)
#
# Only the frontend publishes a host port. Terminate TLS in front of it
# (nginx/Caddy/Traefik) — nothing here speaks HTTPS.
services:
  postgres_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - pg_v2_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port published — Postgres stays on the internal network only.

  # Shared-state backplane for HA (realtime SSE pub/sub, global rate-limit
  # window, broadcast announcement dedup). Required only when running more than
  # one `api` instance behind a load balancer. A single Redis is shared by all
  # API instances across both sites (or replicate Redis per site with a relay).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_v2_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port published — internal network only.

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:?}
      DB_PASS: ${POSTGRES_PASSWORD:?}
      DB_NAME: ${POSTGRES_DB:?}
      # First boot: true to create the schema; then back to false (default).
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      # HA shared-state. Set to switch realtime/rate-limit/broadcasts into the
      # multi-instance-safe code paths. Leave empty for a single api instance.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Read replicas (comma-separated hosts). When set, SELECTs load-balance
      # across replicas and writes go to DB_HOST (the current primary, kept
      # pointed there by the Patroni/VIP HA layer). Empty = single-DB mode.
      DB_REPLICA_HOSTS: ${DB_REPLICA_HOSTS:-}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-5000}
      DB_RETRY_ATTEMPTS: ${DB_RETRY_ATTEMPTS:-10}
      DB_RETRY_DELAY_MS: ${DB_RETRY_DELAY_MS:-3000}
      JWT_SECRET: ${JWT_SECRET:?set a 32+ byte JWT_SECRET in .env}
      JWT_TTL: ${JWT_TTL:-12h}
      PORT: 3000
      # Production hard-offs — never enable these on a live deploy.
      ALLOW_DEV_LOGIN: "false"
      ALLOW_DEV_INTEGRATION_EPHEMERAL: "false"
      SEED_DEMO: "false"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@fsd-mrbs.local}
      SMTP_TLS: ${SMTP_TLS:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host port published — the frontend nginx proxies to api:3000 on the
    # internal network. To reach it directly, add "127.0.0.1:3000:3000".

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Empty → SPA uses same-origin /api via the bundled nginx proxy.
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      # Container listens on 8080 (non-root nginx-unprivileged image).
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_v2_prod:
  redis_v2_prod:
