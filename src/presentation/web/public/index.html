<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FSD MRBS - AD Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="/js/auth.js" defer></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen bg-cover" style="background-image: url('https://images.unsplash.com/photo-1555626906-fcf10d6851b4?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');">
    <div class="absolute inset-0 bg-[#003366] opacity-80"></div>
    <div class="bg-white p-10 rounded-xl shadow-2xl z-10 w-full max-w-md border-t-4 border-[#cc0000]">
        <div class="text-center mb-8">
            <i class="fa-solid fa-fire-shield text-5xl text-[#cc0000] mb-4"></i>
            <h1 class="text-2xl font-bold">FSD MRBS</h1>
            <p class="text-sm text-gray-500">Active Directory Single Sign-On</p>
        </div>
        <form id="loginForm">
            <input type="text" id="username" class="w-full mb-4 px-3 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Username (e.g., officer)" required>
            <input type="password" id="password" class="w-full mb-6 px-3 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Password" required>
            <button type="submit" class="w-full bg-[#003366] text-white font-bold py-3 rounded-lg shadow-lg">Authenticate</button>
            <div id="loginError" class="mt-4 text-sm text-red-600 text-center hidden font-semibold"></div>
        </form>
    </div>
</body>
</html>
