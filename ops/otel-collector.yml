# OpenTelemetry Collector config — receives OTLP traces from the API
# binary and prints them to stdout for development. In production swap
# the `debug` exporter for jaeger / tempo / honeycomb / datadog etc.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 2s
    send_batch_size: 256

exporters:
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug]
